services:
  app:
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: .
      target: development
    container_name: laravel_app
    ports:
      - "5173:5173"
    volumes:
      - ~/projects/stint:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
    depends_on:
      - db

  db:
    image: mysql:8.4 # Optimized for newer hardware/PHP 8.3
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "8000:80"
    volumes:
      - ~/projects/stint:/var/www/html
      - ~/projects/stint/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  db_data: